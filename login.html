<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecliptor - Iniciar Sesión</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="../index.html" class="nav-logo">
                <span class="nav-logo-icon"><i class="fas fa-bolt"></i></span>
                Ecliptor
            </a>
            <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i>Volver</a>
        </nav>
    </header>

    <div class="auth-page">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 1.5rem;">
                <div class="nav-logo-icon" style="width: 48px; height: 48px; font-size: 1.25rem; margin: 0 auto 1rem;">
                    <i class="fas fa-bolt"></i>
                </div>
                <h2>Bienvenido a Ecliptor</h2>
                <p class="auth-subtitle">Crea tu cuenta para comenzar</p>
            </div>

            <form id="registerForm" onsubmit="return handleRegister(event)">
                <div class="profile-upload">
                    <img id="profilePreview" src="https://api.dicebear.com/7.x/avataaars/svg?seed=default" alt="Profile">
                    <label for="profilePic"><i class="fas fa-camera"></i></label>
                    <input type="file" id="profilePic" accept="image/*" onchange="previewImage(event)">
                </div>

                <div class="form-group" id="usernameGroup">
                    <label>Nombre de Usuario</label>
                    <input type="text" id="username" required placeholder="Tu nombre de usuario">
                </div>

                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="tu@correo.com">
                    <p class="form-error" id="emailError">Correo electrónico inválido</p>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" required minlength="6" placeholder="Mínimo 6 caracteres">
                    <p class="form-error" id="passwordError">La contraseña debe tener al menos 6 caracteres</p>
                </div>

                <button type="submit" class="auth-submit">Crear Cuenta</button>
            </form>

            <p class="auth-toggle">
                ¿Ya tienes una cuenta? <a href="#" onclick="toggleForm()" class="toggle-link">Iniciar Sesión</a>
            </p>
        </div>
    </div>

    <script src="../js/main.js"></script>
</body>
</html>
